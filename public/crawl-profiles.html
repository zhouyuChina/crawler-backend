<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>抓取账号配置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      padding: 24px;
      color: #e0e0e0;
    }

    .container { max-width: 1100px; margin: 0 auto; }

    h1 {
      color: #fff;
      text-align: center;
      margin-bottom: 32px;
      font-size: 2rem;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px rgba(0,0,0,.4);
    }

    /* ── Login ── */
    .login-card {
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      padding: 40px;
      max-width: 400px;
      margin: 80px auto 0;
    }
    .login-card h2 { text-align: center; margin-bottom: 24px; font-size: 1.3rem; }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 20px;
      transition: box-shadow .2s;
    }
    .card:hover { box-shadow: 0 4px 24px rgba(0,0,0,.3); }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .card-title { font-size: 1.1rem; font-weight: 600; }

    /* ── Form ── */
    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: .8rem; color: #aaa; }
    input[type="text"], input[type="password"], input[type="url"] {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 8px;
      padding: 9px 12px;
      color: #fff;
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #4fc3f7; }
    input::placeholder { color: #666; }

    /* ── Checkboxes ── */
    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 14px;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .85rem;
      cursor: pointer;
    }
    .checkbox-item input[type="checkbox"] { accent-color: #4fc3f7; width: 15px; height: 15px; }

    /* ── Toggle ── */
    .toggle {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 24px;
      cursor: pointer;
      transition: background .2s;
    }
    .slider:before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    .toggle input:checked + .slider { background: #4fc3f7; }
    .toggle input:checked + .slider:before { transform: translateX(20px); }

    /* ── Buttons ── */
    .btn {
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: .85rem;
      cursor: pointer;
      font-weight: 500;
      transition: opacity .15s, transform .1s;
    }
    .btn:hover { opacity: .85; }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: #4fc3f7; color: #000; }
    .btn-success { background: #66bb6a; color: #000; }
    .btn-warning { background: #ffa726; color: #000; }
    .btn-danger  { background: #ef5350; color: #fff; }
    .btn-outline {
      background: transparent;
      border: 1px solid rgba(255,255,255,.25);
      color: #ccc;
    }
    .btn-sm { padding: 5px 11px; font-size: .8rem; }

    .actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

    /* ── Status badges ── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: .75rem;
      font-weight: 600;
    }
    .badge-ok      { background: rgba(102,187,106,.2); color: #66bb6a; border: 1px solid #66bb6a; }
    .badge-failed  { background: rgba(239,83,80,.2);   color: #ef5350; border: 1px solid #ef5350; }
    .badge-human   { background: rgba(255,167,38,.2);  color: #ffa726; border: 1px solid #ffa726; }
    .badge-unknown { background: rgba(180,180,180,.15);color: #aaa;    border: 1px solid #555; }
    .badge-enabled { background: rgba(79,195,247,.2);  color: #4fc3f7; border: 1px solid #4fc3f7; }
    .badge-disabled{ background: rgba(150,150,150,.1); color: #888;    border: 1px solid #444; }

    /* ── Add form card ── */
    #addFormCard { margin-bottom: 28px; }
    #addFormCard summary {
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      color: #4fc3f7;
      user-select: none;
      padding: 4px 0;
    }
    #addFormCard summary:focus { outline: none; }

    /* ── Error/info msg ── */
    .msg {
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 14px;
      font-size: .85rem;
      display: none;
    }
    .msg-error { background: rgba(239,83,80,.15); border: 1px solid #ef5350; color: #ef9090; }
    .msg-success { background: rgba(102,187,106,.15); border: 1px solid #66bb6a; color: #9ee8a2; }
    .msg-info { background: rgba(79,195,247,.12); border: 1px solid #4fc3f7; color: #8dd8f0; }

    .profile-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
      font-size: .82rem;
      color: #aaa;
    }
    .profile-meta span { display: flex; align-items: center; gap: 4px; }

    #profiles-list .empty {
      text-align: center;
      color: #666;
      padding: 40px 0;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,.08);
      margin: 16px 0;
    }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .header-bar .right { display: flex; gap: 10px; align-items: center; }
    .header-bar .admin-label { font-size: .85rem; color: #aaa; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .inline-toggle { display: flex; align-items: center; gap: 8px; }
    .inline-toggle span { font-size: .82rem; color: #aaa; }
  </style>
</head>
<body>
<div class="container">
  <h1>🕷 抓取账号配置</h1>

  <!-- ── 登录面板 ── -->
  <div id="loginPanel" class="login-card">
    <h2>管理员登录</h2>
    <div id="loginMsg" class="msg msg-error"></div>
    <div class="form-group" style="margin-bottom:14px">
      <label>管理账号</label>
      <input type="text" id="loginUser" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label>管理密码</label>
      <input type="password" id="loginPass" placeholder="密码" autocomplete="current-password">
    </div>
    <button id="loginBtn" class="btn btn-primary" style="width:100%" onclick="doLogin()">登 录</button>
  </div>

  <!-- ── 主面板 ── -->
  <div id="mainPanel" style="display:none">
    <div class="header-bar">
      <span class="admin-label">已登录管理员</span>
      <div class="right">
        <button class="btn btn-outline btn-sm" onclick="refreshList()">刷新</button>
        <button class="btn btn-danger btn-sm" onclick="doLogout()">退出</button>
      </div>
    </div>

    <!-- 新增配置折叠表单 -->
    <div class="card" id="addFormCard">
      <details>
        <summary>＋ 新增抓取配置</summary>
        <div style="margin-top:18px">
          <div id="addMsg" class="msg"></div>
          <div class="form-row">
            <div class="form-group">
              <label>显示名称 *</label>
              <input type="text" id="f_name" placeholder="例如：生产环境主账号">
            </div>
            <div class="form-group">
              <label>CRM 地址 *</label>
              <input type="url" id="f_baseUrl" placeholder="http://173.234.2.174:55668">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>账号 *</label>
              <input type="text" id="f_username" placeholder="CRM 登录账号">
            </div>
            <div class="form-group">
              <label>密码 *</label>
              <input type="password" id="f_password" placeholder="CRM 登录密码">
            </div>
          </div>
          <div class="form-group" style="margin-bottom:14px">
            <label>抓取内容（可多选）</label>
            <div class="checkbox-group" style="margin-top:6px">
              <label class="checkbox-item">
                <input type="checkbox" name="add_contents" value="voiceCallStatus"> 语音呼叫状态
              </label>
              <label class="checkbox-item">
                <input type="checkbox" name="add_contents" value="concurrentStatus"> 并发状态
              </label>
              <label class="checkbox-item">
                <input type="checkbox" name="add_contents" value="voiceRecords"> 语音记录
              </label>
              <label class="checkbox-item">
                <input type="checkbox" name="add_contents" value="manualRecords"> 人工记录
              </label>
              <label class="checkbox-item">
                <input type="checkbox" name="add_contents" value="handDialRecords" checked> 手拨记录
              </label>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:18px">
            <label style="display:flex;align-items:center;gap:10px">
              <span>立即启用</span>
              <label class="toggle">
                <input type="checkbox" id="f_enabled">
                <span class="slider"></span>
              </label>
            </label>
          </div>
          <!-- 高级项 -->
          <details style="margin-bottom:18px">
            <summary style="cursor:pointer;font-size:.82rem;color:#aaa;user-select:none">高级：自定义 mid</summary>
            <div class="form-row" style="margin-top:12px">
              <div class="form-group">
                <label>语音呼叫状态 mid</label>
                <input type="text" id="f_mid_vcs" placeholder="9">
              </div>
              <div class="form-group">
                <label>并发状态 mid</label>
                <input type="text" id="f_mid_cs" placeholder="5">
              </div>
              <div class="form-group">
                <label>语音记录 mid</label>
                <input type="text" id="f_mid_vr" placeholder="24">
              </div>
              <div class="form-group">
                <label>人工记录 mid</label>
                <input type="text" id="f_mid_mr" placeholder="25">
              </div>
            </div>
          </details>
          <button class="btn btn-primary" onclick="doCreate()">保存配置</button>
        </div>
      </details>
    </div>

    <!-- 配置列表 -->
    <div id="globalMsg" class="msg"></div>
    <div id="profiles-list"></div>
  </div>
</div>

<script>
const API = '/api/crawl-profiles';
const ADMIN_TOKEN_KEY = 'crawl_admin_token';

// ──── 工具 ────

function showMsg(el, text, type = 'error') {
  el.className = `msg msg-${type}`;
  el.textContent = text;
  el.style.display = 'block';
  if (type !== 'error') setTimeout(() => { el.style.display = 'none'; }, 4000);
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function apiFetch(path, opts = {}) {
  const { retry = 0, retryDelayMs = 300, ...fetchOpts } = opts;
  const token = localStorage.getItem(ADMIN_TOKEN_KEY);
  let res;
  try {
    res = await fetch(API + path, {
      credentials: 'include',
      headers: {
        'Content-Type': 'application/json',
        ...(token ? { Authorization: `Bearer ${token}` } : {}),
        ...(fetchOpts.headers || {}),
      },
      ...fetchOpts,
    });
  } catch (err) {
    if (retry > 0) {
      await sleep(retryDelayMs);
      return apiFetch(path, { ...fetchOpts, retry: retry - 1, retryDelayMs });
    }
    throw err;
  }
  if ((res.status === 502 || res.status === 503 || res.status === 504) && retry > 0) {
    await sleep(retryDelayMs);
    return apiFetch(path, { ...fetchOpts, retry: retry - 1, retryDelayMs });
  }
  if (res.status === 204) return null;
  const json = await res.json().catch(() => ({}));
  if (!res.ok) {
    const msg =
      (Array.isArray(json.message) ? json.message.join('; ') : json.message) ||
      json.data?.message ||
      `HTTP ${res.status}`;
    throw new Error(msg);
  }
  // Nest TransformInterceptor 统一包装为 { success, data, ... }
  if (json && json.success === true && Object.prototype.hasOwnProperty.call(json, 'data')) {
    return json.data;
  }
  return json;
}

// ──── 登录 / 退出 ────

async function checkSession() {
  const data = await apiFetch('/session').catch(() => ({ loggedIn: false }));
  if (data.loggedIn) {
    document.getElementById('loginPanel').style.display = 'none';
    document.getElementById('mainPanel').style.display = 'block';
    refreshList();
  }
}

async function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const msg = document.getElementById('loginMsg');
  const btn = document.getElementById('loginBtn');
  if (!u || !p) { showMsg(msg, '请填写账号和密码'); return; }
  if (btn.disabled) return;
  btn.disabled = true;
  btn.textContent = '登录中...';
  try {
    const data = await apiFetch('/login', {
      method: 'POST',
      body: JSON.stringify({ username: u, password: p }),
      retry: 1,
      retryDelayMs: 500,
    });
    if (data.success) {
      if (data.token) localStorage.setItem(ADMIN_TOKEN_KEY, data.token);
      document.getElementById('loginPanel').style.display = 'none';
      document.getElementById('mainPanel').style.display = 'block';
      refreshList();
    } else {
      showMsg(msg, data.message || '登录失败');
    }
  } catch (e) {
    showMsg(msg, e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '登 录';
  }
}

document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogout() {
  await apiFetch('/logout', { method: 'POST' }).catch(() => {});
  localStorage.removeItem(ADMIN_TOKEN_KEY);
  location.reload();
}

// ──── 列表 ────

async function refreshList() {
  const el = document.getElementById('profiles-list');
  el.innerHTML = '<p class="empty"><span class="spinner"></span> 加载中...</p>';
  try {
    const list = await apiFetch('');
    renderList(list);
  } catch (e) {
    el.innerHTML = `<p class="empty" style="color:#ef9090">加载失败：${e.message}</p>`;
  }
}

const CONTENT_LABELS = {
  voiceCallStatus: '语音呼叫状态',
  concurrentStatus: '并发状态',
  voiceRecords: '语音记录',
  manualRecords: '人工记录',
  handDialRecords: '手拨记录',
};

const AUTH_BADGES = {
  ok: '<span class="badge badge-ok">✓ 已登录</span>',
  login_failed: '<span class="badge badge-failed">✗ 账密错误</span>',
  human_check_required: '<span class="badge badge-human">⚠ 需人工验证</span>',
  unknown: '<span class="badge badge-unknown">? 未登录</span>',
};

function renderList(list) {
  const el = document.getElementById('profiles-list');
  if (!Array.isArray(list)) list = [];
  if (list.length === 0) {
    el.innerHTML = '<p class="empty">暂无配置，点击上方「新增抓取配置」添加第一组</p>';
    return;
  }
  el.innerHTML = list.map(p => renderProfile(p)).join('');
}

function renderProfile(p) {
  const authBadge = AUTH_BADGES[p.authStatus] || AUTH_BADGES.unknown;
  const enabledBadge = p.enabled
    ? '<span class="badge badge-enabled">运行中</span>'
    : '<span class="badge badge-disabled">已停用</span>';
  const contentsText = (p.contents || []).map(c => CONTENT_LABELS[c] || c).join('、') || '未勾选';
  const lastRun = p.lastRunAt ? new Date(p.lastRunAt).toLocaleString() : '—';
  const lastLogin = p.lastLoginAt ? new Date(p.lastLoginAt).toLocaleString() : '—';

  return `
  <div class="card" id="profile-${p.id}">
    <div class="card-header">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span class="card-title">${esc(p.name)}</span>
        ${enabledBadge}
        ${authBadge}
      </div>
      <div class="actions">
        <label class="toggle" title="${p.enabled ? '点击停用' : '点击启用'}">
          <input type="checkbox" ${p.enabled ? 'checked' : ''} onchange="toggleEnabled('${p.id}', this.checked)">
          <span class="slider"></span>
        </label>
        <button class="btn btn-outline btn-sm" onclick="testLogin('${p.id}')">测试登录</button>
        <button class="btn btn-warning btn-sm" onclick="runOnce('${p.id}')" title="手动执行一次，不影响后台启停">手动抓取一次</button>
        <button class="btn btn-outline btn-sm" onclick="openEdit('${p.id}')">编辑</button>
        <button class="btn btn-danger btn-sm" onclick="deleteProfile('${p.id}', '${esc(p.name)}')">删除</button>
      </div>
    </div>

    <div class="profile-meta">
      <span>🌐 ${esc(p.baseUrl)}</span>
      <span>👤 ${esc(p.username)}</span>
      <span>🕐 上次抓取：${lastRun}</span>
      <span>🔑 上次登录：${lastLogin}</span>
    </div>
    <div style="font-size:.82rem;color:#aaa;margin-bottom:${p.lastError ? '8px' : '0'}">
      抓取内容：${contentsText}
    </div>
    <div style="font-size:.78rem;color:#777;margin-top:4px">
      开关控制后台自动调度；“手动抓取一次”只立即执行一次，不改变启停状态。
    </div>
    ${p.lastError ? `<div style="font-size:.8rem;color:#ef9090;margin-top:6px">⚠ ${esc(p.lastError)}</div>` : ''}

    <!-- 行内编辑区（默认隐藏） -->
    <div id="edit-${p.id}" style="display:none;margin-top:18px">
      <hr class="divider">
      <div id="editMsg-${p.id}" class="msg"></div>
      <div class="form-row">
        <div class="form-group">
          <label>显示名称</label>
          <input type="text" id="e_name_${p.id}" value="${esc(p.name)}">
        </div>
        <div class="form-group">
          <label>CRM 地址</label>
          <input type="url" id="e_baseUrl_${p.id}" value="${esc(p.baseUrl)}">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>账号</label>
          <input type="text" id="e_username_${p.id}" value="${esc(p.username)}">
        </div>
        <div class="form-group">
          <label>新密码（留空不修改）</label>
          <input type="password" id="e_password_${p.id}" placeholder="留空保持原密码">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label>抓取内容</label>
        <div class="checkbox-group" style="margin-top:6px">
          ${Object.entries(CONTENT_LABELS).map(([v, label]) => `
            <label class="checkbox-item">
              <input type="checkbox" name="edit_contents_${p.id}" value="${v}"
                ${(p.contents||[]).includes(v) ? 'checked' : ''}> ${label}
            </label>
          `).join('')}
        </div>
      </div>
      <!-- 高级 mid -->
      <details style="margin-bottom:14px">
        <summary style="cursor:pointer;font-size:.82rem;color:#aaa;user-select:none">高级：自定义 mid</summary>
        <div class="form-row" style="margin-top:10px">
          <div class="form-group"><label>语音呼叫状态</label>
            <input type="text" id="e_mid_vcs_${p.id}" value="${p.mids?.voiceCallStatus ?? 9}"></div>
          <div class="form-group"><label>并发状态</label>
            <input type="text" id="e_mid_cs_${p.id}" value="${p.mids?.concurrentStatus ?? 5}"></div>
          <div class="form-group"><label>语音记录</label>
            <input type="text" id="e_mid_vr_${p.id}" value="${p.mids?.voiceRecords ?? 24}"></div>
          <div class="form-group"><label>人工记录</label>
            <input type="text" id="e_mid_mr_${p.id}" value="${p.mids?.manualRecords ?? 25}"></div>
        </div>
      </details>
      <div class="actions">
        <button class="btn btn-primary btn-sm" onclick="doUpdate('${p.id}')">保存修改</button>
        <button class="btn btn-outline btn-sm" onclick="closeEdit('${p.id}')">取消</button>
      </div>
    </div>
  </div>`;
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ──── 操作 ────

async function toggleEnabled(id, enabled) {
  try {
    await apiFetch(`/${id}/enabled`, { method: 'PATCH', body: JSON.stringify({ enabled }) });
    await refreshList();
  } catch(e) {
    showMsg(document.getElementById('globalMsg'), `操作失败：${e.message}`);
    await refreshList();
  }
}

async function deleteProfile(id, name) {
  if (!confirm(`确认删除「${name}」？删除后不可恢复。`)) return;
  try {
    await apiFetch(`/${id}`, { method: 'DELETE' });
    await refreshList();
  } catch(e) {
    showMsg(document.getElementById('globalMsg'), `删除失败：${e.message}`);
  }
}

async function testLogin(id) {
  const gMsg = document.getElementById('globalMsg');
  gMsg.style.display = 'none';
  try {
    const data = await apiFetch(`/${id}/test-login`, { method: 'POST' });
    showMsg(gMsg, `测试登录：${data.message}`, data.success ? 'success' : 'error');
    await refreshList();
  } catch(e) {
    showMsg(gMsg, `测试登录失败：${e.message}`);
  }
}

async function runOnce(id) {
  const gMsg = document.getElementById('globalMsg');
  gMsg.style.display = 'none';
  try {
    const data = await apiFetch(`/${id}/run-once`, { method: 'POST' });
    const level = data.accepted ? 'success' : 'error';
    const detail = data.tasks?.length ? `（${data.tasks.join(', ')}）` : '';
    showMsg(gMsg, `${data.message}${detail}`, level);
  } catch(e) {
    showMsg(gMsg, `触发失败：${e.message}`);
  }
}

function openEdit(id) {
  document.getElementById(`edit-${id}`).style.display = 'block';
}
function closeEdit(id) {
  document.getElementById(`edit-${id}`).style.display = 'none';
}

async function doCreate() {
  const msg = document.getElementById('addMsg');
  const name = document.getElementById('f_name').value.trim();
  const baseUrl = document.getElementById('f_baseUrl').value.trim();
  const username = document.getElementById('f_username').value.trim();
  const password = document.getElementById('f_password').value;
  const enabled = document.getElementById('f_enabled').checked;
  const contents = [...document.querySelectorAll('input[name="add_contents"]:checked')].map(el => el.value);

  if (!name || !baseUrl || !username || !password) {
    showMsg(msg, '请填写名称、CRM 地址、账号和密码', 'error');
    return;
  }

  const mids = buildMids(
    document.getElementById('f_mid_vcs').value,
    document.getElementById('f_mid_cs').value,
    document.getElementById('f_mid_vr').value,
    document.getElementById('f_mid_mr').value,
  );

  try {
    await apiFetch('', { method: 'POST', body: JSON.stringify({ name, baseUrl, username, password, enabled, contents, mids }) });
    showMsg(msg, '已新增', 'success');
    // 清空表单
    ['f_name','f_baseUrl','f_username','f_password','f_mid_vcs','f_mid_cs','f_mid_vr','f_mid_mr'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.querySelectorAll('input[name="add_contents"]').forEach(el => el.checked = false);
    const handDialDefault = document.querySelector('input[name="add_contents"][value="handDialRecords"]');
    if (handDialDefault) handDialDefault.checked = true;
    document.getElementById('f_enabled').checked = false;
    await refreshList();
  } catch(e) {
    showMsg(msg, `新增失败：${e.message}`, 'error');
  }
}

async function doUpdate(id) {
  const msg = document.getElementById(`editMsg-${id}`);
  const dto = {};

  const name = document.getElementById(`e_name_${id}`).value.trim();
  const baseUrl = document.getElementById(`e_baseUrl_${id}`).value.trim();
  const username = document.getElementById(`e_username_${id}`).value.trim();
  const password = document.getElementById(`e_password_${id}`).value;
  const contents = [...document.querySelectorAll(`input[name="edit_contents_${id}"]:checked`)].map(el => el.value);

  if (name) dto.name = name;
  if (baseUrl) dto.baseUrl = baseUrl;
  if (username) dto.username = username;
  if (password) dto.password = password;
  dto.contents = contents;
  dto.mids = buildMids(
    document.getElementById(`e_mid_vcs_${id}`).value,
    document.getElementById(`e_mid_cs_${id}`).value,
    document.getElementById(`e_mid_vr_${id}`).value,
    document.getElementById(`e_mid_mr_${id}`).value,
  );

  try {
    await apiFetch(`/${id}`, { method: 'PUT', body: JSON.stringify(dto) });
    showMsg(msg, '已保存', 'success');
    await refreshList();
  } catch(e) {
    showMsg(msg, `保存失败：${e.message}`, 'error');
  }
}

function buildMids(vcs, cs, vr, mr) {
  const mids = {};
  if (vcs) mids.voiceCallStatus = parseInt(vcs, 10);
  if (cs)  mids.concurrentStatus = parseInt(cs, 10);
  if (vr)  mids.voiceRecords = parseInt(vr, 10);
  if (mr)  mids.manualRecords = parseInt(mr, 10);
  return Object.keys(mids).length ? mids : undefined;
}

// ──── 初始化 ────
checkSession();
