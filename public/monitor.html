<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>插件请求监控</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .stat-value {
            color: #333;
            font-size: 2em;
            font-weight: bold;
        }

        .stat-value.success {
            color: #10b981;
        }

        .stat-value.error {
            color: #ef4444;
        }

        .stat-value.rate {
            color: #3b82f6;
        }

        .connection-status {
            background: white;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ef4444;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #10b981;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .panel {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .panel-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .request-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .request-item {
            padding: 15px;
            border-bottom: 1px solid #e5e7eb;
            transition: background 0.2s;
        }

        .request-item:hover {
            background: #f9fafb;
        }

        .request-item:last-child {
            border-bottom: none;
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .request-method {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
            color: white;
        }

        .method-GET { background: #3b82f6; }
        .method-POST { background: #10b981; }
        .method-PUT { background: #f59e0b; }
        .method-DELETE { background: #ef4444; }

        .request-url {
            color: #4b5563;
            font-size: 0.9em;
            word-break: break-all;
            margin: 5px 0;
        }

        .request-time {
            color: #9ca3af;
            font-size: 0.85em;
        }

        .request-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .status-success {
            background: #d1fae5;
            color: #065f46;
        }

        .status-error {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-processing {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-skipped {
            background: #f3f4f6;
            color: #6b7280;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }

        .request-details {
            font-size: 0.85em;
            color: #6b7280;
            margin-top: 8px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .new-request {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .response-body-section {
            margin-top: 10px;
            border-top: 1px dashed #e5e7eb;
            padding-top: 10px;
        }

        .response-body-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            cursor: pointer;
            user-select: none;
        }

        .response-body-label {
            font-weight: 600;
            color: #4b5563;
            font-size: 0.9em;
        }

        .toggle-icon {
            color: #9ca3af;
            font-size: 0.8em;
            transition: transform 0.2s;
        }

        .toggle-icon.expanded {
            transform: rotate(180deg);
        }

        .response-body-content {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            color: #1f2937;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            display: none;
        }

        .response-body-content.show {
            display: block;
        }

        .response-body-content::-webkit-scrollbar {
            width: 6px;
        }

        .response-body-content::-webkit-scrollbar-track {
            background: #e5e7eb;
            border-radius: 3px;
        }

        .response-body-content::-webkit-scrollbar-thumb {
            background: #9ca3af;
            border-radius: 3px;
        }

        .status-code {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: 600;
            margin-left: 8px;
        }

        .status-code.success {
            background: #d1fae5;
            color: #065f46;
        }

        .status-code.error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>插件请求监控面板</h1>

        <div class="connection-status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">正在连接...</span>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">总请求数</div>
                <div class="stat-value" id="totalRequests">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">成功</div>
                <div class="stat-value success" id="successRequests">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">失败</div>
                <div class="stat-value error" id="errorRequests">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">跳过</div>
                <div class="stat-value" id="skippedRequests">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">成功率</div>
                <div class="stat-value rate" id="successRate">0%</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">最近请求 (最新100条)</div>
            <div class="request-list" id="requestList">
                <div class="empty-state">
                    等待请求数据...
                </div>
            </div>
        </div>
    </div>

    <script>
        let socket;
        let stats = {
            total: 0,
            success: 0,
            error: 0,
            skipped: 0
        };
        let requests = [];
        const MAX_REQUESTS = 100;

        // 转义 HTML 特殊字符
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // 切换响应体的显示/隐藏
        function toggleResponseBody(index) {
            const bodyElement = document.getElementById(`body-${index}`);
            const toggleIcon = document.getElementById(`toggle-${index}`);

            if (bodyElement.classList.contains('show')) {
                bodyElement.classList.remove('show');
                toggleIcon.classList.remove('expanded');
            } else {
                bodyElement.classList.add('show');
                toggleIcon.classList.add('expanded');
            }
        }

        function connectWebSocket() {
            const wsUrl = window.location.protocol === 'https:'
                ? `wss://${window.location.hostname}:${window.location.port}/ws`
                : `ws://${window.location.hostname}:${window.location.port}/ws`;

            socket = io(wsUrl, {
                transports: ['websocket', 'polling']
            });

            socket.on('connect', () => {
                console.log('WebSocket 连接成功');
                updateConnectionStatus(true);
            });

            socket.on('disconnect', () => {
                console.log('WebSocket 断开连接');
                updateConnectionStatus(false);
            });

            socket.on('connect_error', (error) => {
                console.error('连接错误:', error);
                updateConnectionStatus(false);
            });

            // 监听请求状态更新
            socket.on('request:received', (data) => {
                console.log('收到请求:', data);
                addRequest(data);
            });

            socket.on('request:processed', (data) => {
                console.log('请求处理完成:', data);
                updateRequest(data);
            });

            // 监听网页创建事件（兼容现有逻辑）
            socket.on('webpage:created', (data) => {
                console.log('网页已创建:', data);
            });
        }

        function updateConnectionStatus(connected) {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            if (connected) {
                statusDot.classList.add('connected');
                statusText.textContent = 'WebSocket 已连接';
            } else {
                statusDot.classList.remove('connected');
                statusText.textContent = 'WebSocket 未连接';
            }
        }

        function addRequest(data) {
            const request = {
                id: data.id || Date.now(),
                method: data.method || 'REQUEST',
                url: data.url,
                status: data.status || 'processing',
                timestamp: data.timestamp || new Date().toISOString(),
                message: data.message,
                error: data.error,
                skipped: data.skipped,
                responseBody: data.responseBody,
                statusCode: data.statusCode
            };

            requests.unshift(request);
            if (requests.length > MAX_REQUESTS) {
                requests.pop();
            }

            updateStats(request);
            renderRequests();
        }

        function updateRequest(data) {
            const index = requests.findIndex(r => r.id === data.id);
            if (index !== -1) {
                requests[index] = { ...requests[index], ...data };
                updateStats(requests[index]);
                renderRequests();
            } else {
                addRequest(data);
            }
        }

        function updateStats(request) {
            stats.total = requests.length;
            stats.success = requests.filter(r => r.status === 'success' && !r.skipped).length;
            stats.error = requests.filter(r => r.status === 'error').length;
            stats.skipped = requests.filter(r => r.skipped).length;

            document.getElementById('totalRequests').textContent = stats.total;
            document.getElementById('successRequests').textContent = stats.success;
            document.getElementById('errorRequests').textContent = stats.error;
            document.getElementById('skippedRequests').textContent = stats.skipped;

            // 计算成功率：只统计有效请求（排除跳过的）
            const validRequests = stats.total - stats.skipped;
            const successRate = validRequests > 0
                ? Math.round((stats.success / validRequests) * 100)
                : 0;
            document.getElementById('successRate').textContent = validRequests > 0 ? successRate + '%' : 'N/A';
        }

        function renderRequests() {
            const listElement = document.getElementById('requestList');

            if (requests.length === 0) {
                listElement.innerHTML = '<div class="empty-state">等待请求数据...</div>';
                return;
            }

            listElement.innerHTML = requests.map((req, index) => {
                const time = new Date(req.timestamp).toLocaleString('zh-CN');
                const statusClass = req.skipped ? 'skipped' : req.status;
                const statusText = req.skipped ? '跳过' :
                    req.status === 'success' ? '成功' :
                    req.status === 'error' ? '失败' : '处理中';

                // 状态码显示
                const statusCodeHtml = req.statusCode
                    ? `<span class="status-code ${req.statusCode >= 200 && req.statusCode < 300 ? 'success' : 'error'}">
                         ${req.statusCode}
                       </span>`
                    : '';

                // 响应体显示
                const responseBodyHtml = req.responseBody
                    ? `<div class="response-body-section">
                         <div class="response-body-header" onclick="toggleResponseBody(${index})">
                           <span class="response-body-label">📄 响应体 (${req.responseBody.length} 字符)</span>
                           <span class="toggle-icon" id="toggle-${index}">▼</span>
                         </div>
                         <div class="response-body-content" id="body-${index}">${escapeHtml(req.responseBody)}</div>
                       </div>`
                    : '';

                return `
                    <div class="request-item new-request">
                        <div class="request-header">
                            <span class="request-method method-${req.method}">${req.method}</span>
                            <span class="request-status status-${statusClass}">${statusText}${statusCodeHtml}</span>
                        </div>
                        <div class="request-url">${req.url}</div>
                        ${req.message ? `<div class="request-details">${req.message}</div>` : ''}
                        ${req.error ? `<div class="request-details" style="color: #ef4444;">错误: ${req.error}</div>` : ''}
                        ${responseBodyHtml}
                        <div class="request-time">${time}</div>
                    </div>
                `;
            }).join('');

            // 移除动画类（下次可以重新触发）
            setTimeout(() => {
                document.querySelectorAll('.new-request').forEach(el => {
                    el.classList.remove('new-request');
                });
            }, 300);
        }

        // 页面加载时连接 WebSocket
        connectWebSocket();
    </script>
</body>
</html>
